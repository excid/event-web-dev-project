services:

  db:
    image: postgres:16
    container_name: eventboard-db
    environment:
      POSTGRES_DB: EventWebDb
      POSTGRES_USER: eventuser
      POSTGRES_PASSWORD: EventBoard@123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventuser -d EventWebDb"]
      interval: 10s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: eventboard-app
    ports:
      - "8080:8080"
    volumes:
      - .:/src
      - app_obj:/src/obj
      - app_bin:/src/bin
      - app_keys:/src/DataProtection-Keys
    environment:
      TZ: Asia/Bangkok
      ConnectionStrings__DefaultConnection: >
        Host=db;Port=5432;Database=EventWebDb;
        Username=eventuser;Password=EventBoard@123;
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: eventboard-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
  app_obj:
  app_bin:
  app_keys: