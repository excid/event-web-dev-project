<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="LoginPage_c.css">
</head>
<body>
    <div class="container">
        <h1>Event Board<br></h1>
        <h2>Sign In to your account<br></h2>
        <div class="login-card">
            <form>
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="form-helper">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="signin-btn">Sign in</button>

                <p class="footer-signup"> Don't have an account? <a href="SigninPage_h.html">Signup</a></p>
            </form>
        </div>
        <div class="footer-guest"> <a href="#" class="guest-link">← Continue as guest (browse only)</a> </div>
    </div>
</body>
</html>
